name: Release VSIX

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace
        run: |
          pnpm run typecheck
          pnpm run lint
          pnpm run test

  release-vsix:
    name: Build VSIX (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win32-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve VSIX name
        id: vsix
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME//\//-}"
          echo "name=classic-asp-lsp-${tag_name}-${{ matrix.target }}.vsix" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        shell: bash
        env:
          ASP_LSP_PACKAGE_TARGET: ${{ matrix.target }}
        run: pnpm run package:vsix --target "${{ matrix.target }}" --out "$GITHUB_WORKSPACE/${{ steps.vsix.outputs.name }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.vsix.outputs.name }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs: release-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.vsix
          generate_release_notes: true
