name: Release VSIX

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  CI: "true"

jobs:
  validate:
    name: Validate workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace
        run: |
          pnpm --config.verify-deps-before-run=false run typecheck
          pnpm --config.verify-deps-before-run=false run lint
          pnpm --config.verify-deps-before-run=false run test

  release-vsix:
    name: Build VSIX
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve VSIX name
        id: vsix
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME//\//-}"
          echo "name=classic-asp-lsp-${tag_name}.vsix" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        shell: bash
        run: |
          pnpm --config.verify-deps-before-run=false run build
          pnpm --filter classic-asp-lsp exec vsce package --no-dependencies --follow-symlinks --out "$GITHUB_WORKSPACE/${{ steps.vsix.outputs.name }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: ${{ steps.vsix.outputs.name }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs: release-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.vsix
          generate_release_notes: true
